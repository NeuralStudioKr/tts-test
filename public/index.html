<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔊 TTS 스피커 테스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .card { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 560px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .desc { color: #666; font-size: 14px; margin-bottom: 24px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
  textarea, select { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 12px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  textarea:focus, select:focus { border-color: #5b4fcf; }
  textarea { resize: vertical; min-height: 80px; }
  .field { margin-bottom: 16px; }
  .btns { display: flex; gap: 10px; margin-bottom: 16px; }
  button { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  #playBtn { background: #5b4fcf; color: white; }
  #playBtn:hover:not(:disabled) { background: #4a3eb8; }
  #playBtn:disabled { opacity: 0.5; cursor: not-allowed; }
  #stopBtn { background: #ef4444; color: white; display: none; }
  #stopBtn:hover { background: #dc2626; }
  .status { text-align: center; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 500; margin-bottom: 16px; background: #f5f5f5; color: #666; }
  .status.playing { background: #d1fae5; color: #059669; }
  .status.loading { background: #fef9c3; color: #b45309; }
  .status.error { background: #fee2e2; color: #dc2626; }
  .log-title { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 8px; }
  #log { background: #1a1a2e; border-radius: 10px; padding: 14px; font-family: monospace; font-size: 12px; min-height: 100px; max-height: 200px; overflow-y: auto; }
  .log-line { margin-bottom: 4px; }
  .log-ok { color: #4ade80; }
  .log-err { color: #f87171; }
  .log-info { color: #94a3b8; }
</style>
</head>
<body>
<div class="card">
  <h1>🔊 TTS 스피커 테스트</h1>
  <p class="desc">텍스트 입력 → 재생 → 스피커 출력 확인 (OpenAI TTS API)</p>

  <div class="field">
    <label>텍스트</label>
    <textarea id="text">안녕하세요! 저는 민이사입니다. 스피커 테스트 중입니다. 잘 들리시나요?</textarea>
  </div>

  <div class="field">
    <label>목소리</label>
    <select id="voice">
      <option value="alloy">alloy (기본)</option>
      <option value="onyx" selected>onyx (중후 - 민이사)</option>
      <option value="echo">echo (차갑게 - 민소장)</option>
      <option value="nova">nova (밝음)</option>
      <option value="shimmer">shimmer (부드러움)</option>
    </select>
  </div>

  <div class="btns">
    <button id="playBtn" onclick="play()">▶ 재생</button>
    <button id="stopBtn" onclick="stop()">⏹ 중지</button>
  </div>

  <div id="status" class="status">대기 중 — 재생 버튼을 눌러 테스트하세요</div>

  <div class="log-title">디버그 로그</div>
  <div id="log"><span class="log-info">재생 버튼을 누르면 로그가 나타납니다</span></div>
</div>

<script>
let currentAudio = null

function log(msg, type = 'info') {
  const el = document.getElementById('log')
  const line = document.createElement('div')
  line.className = `log-line log-${type}`
  const time = new Date().toLocaleTimeString('ko-KR')
  line.textContent = `[${time}] ${msg}`
  el.insertBefore(line, el.firstChild)
}

function setStatus(text, cls = '') {
  const el = document.getElementById('status')
  el.textContent = text
  el.className = 'status ' + cls
}

async function play() {
  const text = document.getElementById('text').value.trim()
  const voice = document.getElementById('voice').value
  if (!text) return

  document.getElementById('playBtn').disabled = true
  document.getElementById('stopBtn').style.display = 'block'
  setStatus('⏳ TTS API 요청 중...', 'loading')
  log(`요청: "${text.slice(0, 40)}..." voice=${voice}`)

  try {
    const res = await fetch('/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voice })
    })

    log(`응답: HTTP ${res.status} ${res.ok ? 'OK' : 'FAIL'}`, res.ok ? 'info' : 'err')

    if (!res.ok) {
      const err = await res.text()
      log(`오류: ${err}`, 'err')
      setStatus('❌ 서버 오류 — 로그 확인', 'error')
      reset()
      return
    }

    const blob = await res.blob()
    log(`오디오 수신: ${blob.size} bytes, type=${blob.type}`, 'ok')

    const url = URL.createObjectURL(blob)
    const audio = new Audio(url)
    currentAudio = audio

    audio.onplay = () => {
      setStatus('🔊 스피커로 재생 중! 들리시나요?', 'playing')
      log('재생 시작!', 'ok')
    }
    audio.onended = () => {
      log('재생 완료 ✅', 'ok')
      setStatus('✅ 재생 완료 — 들리셨나요?')
      URL.revokeObjectURL(url)
      reset()
    }
    audio.onerror = () => {
      log(`오디오 에러: ${audio.error?.message || '알 수 없음'}`, 'err')
      setStatus('❌ 오디오 재생 오류', 'error')
      URL.revokeObjectURL(url)
      reset()
    }

    await audio.play()
  } catch (e) {
    log(`예외: ${e.message}`, 'err')
    setStatus('❌ 네트워크 오류 — 로그 확인', 'error')
    reset()
  }
}

function stop() {
  if (currentAudio) {
    currentAudio.pause()
    currentAudio = null
    log('재생 중지', 'info')
    setStatus('⏹ 중지됨')
    reset()
  }
}

function reset() {
  document.getElementById('playBtn').disabled = false
  document.getElementById('stopBtn').style.display = 'none'
}
</script>
</body>
</html>
